name: CI
on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: true
      matrix:
        package: [api, web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        if: matrix.package == 'web'
        run: pnpm --filter web run playwright:install

      - name: Lint (${{ matrix.package }})
        run: pnpm --filter ${{ matrix.package }} lint

      - name: Unit tests (${{ matrix.package }})
        run: pnpm --filter ${{ matrix.package }} test:unit

      - name: Build (${{ matrix.package }})
        run: pnpm --filter ${{ matrix.package }} build

  integration:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api test:int

  e2e:
    needs: [test, integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter web run playwright:install

      - run: pnpm -r build
        env:
          VITE_API_BASE_URL: "http://localhost:8787"
      - run: pnpm --filter web test:e2e

  deploy:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/chore/p0-hardening'
    needs: [test, integration, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations
        working-directory: packages/api
        run: pnpm exec wrangler d1 migrations apply DB --remote --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy API Worker
        working-directory: packages/api
        run: pnpm exec wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - run: pnpm -r build
        env:
          VITE_API_BASE_URL: "https://polaris-api-production.kelpselp.workers.dev"

      - name: Deploy Web static assets
        working-directory: packages/web
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
